services:
  db:
    image: pgvector/pgvector:pg16
    container_name: interview_agent_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
      POSTGRES_DB: interview_assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d interview_assistant"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: interview_agent_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PGHOST: db
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: your_password
      PGDATABASE: interview_assistant
      PORT: "3000"
      NODE_ENV: production
    ports:
      - "3000:3000"
    volumes:
      - uploads_data:/app/uploads
      - cvs_data:/app/cvs

volumes:
  pgdata:
  uploads_data:
  cvs_data:
